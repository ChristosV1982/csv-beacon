<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>C.S.V. BEACON – Mooring Component Detail</title>
  <link rel="stylesheet" href="./csv-beacon-theme.css?v=20260428_3" />

  <style>
    body{margin:0;font-family:var(--font-sans,"Segoe UI",Arial,sans-serif);background:#f4f8fc;color:#10233f;}
    .topbar{background:linear-gradient(90deg,#061d3d,#1a4170);color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
    .wrap{padding:10px;}
    .panel{background:#fff;border:1px solid #cbdff5;border-radius:14px;padding:14px;box-shadow:0 10px 28px rgba(3,27,63,.05);}

    .muted{color:#4d6283;margin-top:8px;line-height:1.4;}
    .btn2{background:#eaf6fb;color:#062a5e;border:1px solid #9fd8ec;border-radius:10px;padding:8px 12px;font-weight:800;cursor:pointer;}

</head>
<body>
  <div class="topbar">
    <div><strong>C.S.V. BEACON</strong> – Mooring Component Detail</div>

  <main class="wrap">
    <section class="panel">
      <h1>Component Detail Page</h1>
      <div class="muted">
        This page is reserved for Frontend 4-B. The selected component ID is:
      </div>
      <pre id="componentIdBox"></pre>

  </main>
  <script>
    const id = new URLSearchParams(location.search).get("id") || "No component id supplied";
    document.getElementById("componentIdBox").textContent = id;
