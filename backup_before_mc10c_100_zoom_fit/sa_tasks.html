<!-- public/sa_tasks.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Self-Assessment Tasks</title>

  <link rel="stylesheet" href="./csv-beacon-theme.css?v=20260428_3" />
  <link rel="stylesheet" href="./style.css?v=20260428_3" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth.js"></script>
  <script src="./csvb-module-guard.js?v=20260429_1"></script>

  <style>
    body { margin:0; font-family:"Segoe UI", Arial, sans-serif; background:#f5f7fb; color:#14223a; }
    .topbar {
      background:#1a4170; color:#fff; padding:12px 16px;
      display:flex; justify-content:space-between; align-items:center;
      gap:12px; flex-wrap:wrap;
    }
    .wrap { padding:18px; max-width:1400px; margin:0 auto; }
    .btn { background:#295eb0; color:#fff; border:none; border-radius:10px; padding:10px 14px; font-weight:900; cursor:pointer; }
    .btn2 { background:#eaf1fb; color:#1a4170; border:1px solid #d5deef; border-radius:10px; padding:10px 14px; font-weight:900; cursor:pointer; }
    .card { background:#fff; border:1px solid #d5deef; border-radius:14px; padding:14px; box-shadow: 0 4px 18px rgba(18,44,87,0.10); }
    .muted { color:#35507b; font-weight:800; }
    .warn {
      margin-top:10px; background:#fff2f2; border:1px solid #f1c7c7; color:#7a1f1f;
      font-weight:900; border-radius:12px; padding:10px; display:none; white-space:pre-wrap;
    }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    select {
      padding:10px 10px; border-radius:10px; border:1px solid #c9d9f3; background:#fff; font-weight:800;
    }
    table { width:100%; border-collapse:collapse; background:#fff; }
    th, td { padding:10px; border-bottom:1px solid #e6eefb; vertical-align:top; }
    th { text-align:left; background:#f2f7ff; color:#1a4170; font-weight:950; position:sticky; top:0; }
  </style>
  <link rel="stylesheet" href="./csvb-ui-polish.css?v=20260430_1" />
  <link rel="stylesheet" href="./csvb-help-tooltips.css?v=20260430_1" />
</head>

<body>
  <div class="topbar">
    <div><b>My Self-Assessment Tasks</b></div>
    <div class="row">
      <div id="userBadge" style="font-weight:800; opacity:0.95;"></div>
      <button class="btn2" type="button" onclick="location.href='./q-dashboard.html'">Dashboard</button>
      <button class="btn2" type="button" onclick="location.href='./sa_compare.html'">Pre/Post Compare</button>
      <button class="btn" id="logoutBtn" type="button">Logout</button>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="muted">
        This list is driven by <b>self_assess_instances</b> and RLS. You will only see tasks assigned to your role/position.
      </div>

      <div id="warnBox" class="warn"></div>

      <div class="row" style="margin-top:12px; justify-content:space-between;">
        <div class="row">
          <span class="muted" style="font-weight:900;">Campaign</span>
          <select id="campaignFilter"></select>
        </div>
        <div class="row">
          <button class="btn2" id="refreshBtn" type="button">Refresh</button>
        </div>
      </div>

      <div style="margin-top:12px; overflow:auto;">
        <table>
          <thead>
            <tr>
              <th style="width:34%;">Title</th>
              <th style="width:16%;">Vessel</th>
              <th style="width:12%;">Due</th>
              <th style="width:12%;">Status</th>
              <th style="width:26%;">Actions</th>
            </tr>
          </thead>

          <!-- sa_tasks.js uses rowsBody -->
          <tbody id="rowsBody">
            <tr><td colspan="5" class="muted">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module" src="./sa_tasks.js"></script>
  <script src="./csvb-ui-polish.js?v=20260430_1"></script>
  <script src="./csvb-help-tooltips.js?v=20260430_1"></script>
</body>
</html>
