<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pre/Post Inspection Comparison</title>

  <link rel="stylesheet" href="./csv-beacon-theme.css?v=20260428_3" />
  <link rel="stylesheet" href="./style.css?v=20260428_3" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth.js"></script>
  <script src="./csvb-module-guard.js?v=20260429_1"></script>

  <style>
    body { margin:0; font-family:"Segoe UI", Arial, sans-serif; background:#f5f7fb; }
    .topbar { background:#1a4170; color:#fff; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .wrap { padding:18px; max-width:1400px; margin:0 auto; }
    .btn { background:#295eb0; color:#fff; border:none; border-radius:10px; padding:10px 14px; font-weight:900; cursor:pointer; }
    .btn2 { background:#eaf1fb; color:#1a4170; border:1px solid #d5deef; border-radius:10px; padding:10px 14px; font-weight:900; cursor:pointer; }
    .card { background:#fff; border:1px solid #d5deef; border-radius:14px; padding:14px; box-shadow: 0 4px 18px rgba(18,44,87,0.10); }
    .muted { color:#35507b; font-weight:800; }
    label { display:block; font-weight:900; color:#1a4170; margin:10px 0 6px 0; }
    input, select { width:100%; box-sizing:border-box; padding:10px 12px; border-radius:10px; border:1px solid #cbd7ee; font-weight:800; color:#1a4170; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px; border-bottom:1px solid #e6eefb; vertical-align:top; }
    th { text-align:left; background:#f2f7ff; color:#1a4170; font-weight:950; }
    .warn { margin-top:10px; background:#fff2f2; border:1px solid #f1c7c7; color:#7a1f1f; font-weight:900; border-radius:12px; padding:10px; display:none; white-space:pre-wrap; }
    .pill { display:inline-block; padding:3px 10px; border-radius:999px; font-weight:900; border:1px solid #d5deef; background:#f2f7ff; color:#1a4170; }
  </style>
  <link rel="stylesheet" href="./csvb-ui-polish.css?v=20260430_1" />
  <link rel="stylesheet" href="./csvb-help-tooltips.css?v=20260430_1" />
</head>
<body>
  <div class="topbar">
    <div><b>Pre/Post Inspection Comparison</b></div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div id="userBadge" style="font-weight:800; opacity:0.95;"></div>
      <button class="btn2" onclick="location.href='./q-dashboard.html'">Dashboard</button>
      <button class="btn2" onclick="location.href='./sa_tasks.html'">My SA Tasks</button>
      <button class="btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="muted">Uses RPCs created in Step 1: <code>compare_pre_post_summary</code> and <code>compare_pre_post_gaps</code>.</div>
      <div id="warnBox" class="warn"></div>

      <div class="row" style="margin-top:12px;">
        <div>
          <label>Vessel</label>
          <select id="vesselSelect"></select>
        </div>
        <div>
          <label>Campaign (optional)</label>
          <select id="campaignSelect"></select>
        </div>
      </div>

      <div class="row">
        <div>
          <label>Post Inspection From (optional)</label>
          <input id="fromDate" type="date" />
        </div>
        <div>
          <label>Post Inspection To (optional)</label>
          <input id="toDate" type="date" />
        </div>
      </div>

      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:12px;">
        <button class="btn" id="runBtn">Run Comparison</button>
        <button class="btn2" id="loadPostOnlyBtn">Load Post-only (new obs)</button>
        <button class="btn2" id="loadPreOnlyBtn">Load Pre-only (missed in post)</button>
      </div>

      <div style="margin-top:14px;">
        <div class="pill">Summary</div>
        <table style="margin-top:10px;">
          <thead>
            <tr>
              <th>Pre flagged only</th>
              <th>Post only</th>
              <th>Both</th>
              <th>Union questions</th>
            </tr>
          </thead>
          <tbody>
            <tr id="sumRow">
              <td>-</td><td>-</td><td>-</td><td>-</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div style="margin-top:14px;">
        <div class="pill">Gap List</div>
        <div id="gapBox" class="muted" style="margin-top:8px; white-space:pre-wrap;"></div>
      </div>
    </div>
  </div>

  <script type="module" src="./sa_compare.js"></script>
  <script>
    (async () => {
      const me = await AUTH.requireAuth([]);
      if (!me) return;
      AUTH.fillUserBadge(me, "userBadge");
      document.getElementById("logoutBtn").addEventListener("click", AUTH.logoutAndGoLogin);
    })();
  </script>
  <script src="./csvb-ui-polish.js?v=20260430_1"></script>
  <script src="./csvb-help-tooltips.js?v=20260430_1"></script>
</body>
</html>
